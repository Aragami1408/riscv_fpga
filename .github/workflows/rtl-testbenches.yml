name: RTL Testbenches (cocotb)

on:
  push:
  pull_request:

jobs:
  cocotb-tests:
    runs-on: ubuntu-latest
    env:
      SIM: verilator

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Verilator build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git help2man perl python3 make autoconf g++ flex bison \
            ccache libgoogle-perftools-dev numactl perl-doc libfl2 libfl-dev

      - name: Cache Verilator build
        id: verilator-cache
        uses: actions/cache@v4
        with:
          path: ~/verilator-install
          key: verilator-v5.036-${{ runner.os }}

      - name: Build Verilator from source
        if: steps.verilator-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v5.036 https://github.com/verilator/verilator.git
          cd verilator
          autoconf
          ./configure --prefix="$HOME/verilator-install"
          make -j "$(nproc)"
          make install

      - name: Add Verilator to PATH
        run: echo "$HOME/verilator-install/bin" >> "$GITHUB_PATH"

      - name: Verify Verilator
        run: verilator --version

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cocotb cocotb-tools

      - name: Run testbenches
        working-directory: tb
        run: python3 test_runner.py

      - name: Upload waveform dumps (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cocotb-vcd-dumps
          path: tb/**/dump.vcd
          if-no-files-found: ignore

      - name: Upload cocotb result XML (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cocotb-results
          path: |
            tb/**/results.xml
            tb/**/sim_build/**
          if-no-files-found: ignore
